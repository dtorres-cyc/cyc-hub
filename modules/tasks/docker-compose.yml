version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyc_tasks_db
    environment:
      POSTGRES_USER: cyc_user
      POSTGRES_PASSWORD: cyc_password
      POSTGRES_DB: cyc_tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: cyc_tasks_app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://cyc_user:cyc_password@postgres:5432/cyc_tasks
      PORT: 3001
      JWT_SECRET: change-in-production
      JWT_REFRESH_SECRET: change-refresh-in-production
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
